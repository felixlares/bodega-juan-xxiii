<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a0845" />
      <stop offset="100%" stop-color="#6441A5" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdfbfb" />
      <stop offset="100%" stop-color="#ebedee" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGradient)"/>

  <g transform="translate(0, 20)">
    <!-- Wine Bottle (Bodega concept) -->
    <path fill="url(#iconGradient)" d="M224 80h64v48c0 17-14 32-32 32s-32-15-32-32V80zm-32 64h128v200c0 30-22 56-52 62v26c0 13-11 24-24 24h-16c-13 0-24-11-24-24v-26c-30-6-52-32-52-62V144z" filter="url(#shadow)"/>
    
    <!-- Shield/Check overlay to mean quality -->
    <circle cx="320" cy="300" r="48" fill="#FFC312" filter="url(#shadow)"/>
    <path fill="#2a0845" d="M305 305l-15-15-10 10 25 25 40-40-10-10-30 30z"/>
  </g>
  
  <text x="256" y="450" font-family="Inter, sans-serif" font-size="44" font-weight="800" fill="#ffffff" text-anchor="middle" filter="url(#shadow)">Bodega Juan XXIII</text>
</svg>
